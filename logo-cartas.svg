<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>

    <!-- Red band with gold stars (26×26 tile) -->
    <pattern id="starband" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
      <rect width="26" height="26" fill="#C41E3A"/>
      <polygon points="13,3 15.4,9.8 22.5,9.9 16.8,14.2 18.9,21.1 13,17 7.1,21.1 9.2,14.2 3.5,9.9 10.6,9.8"
               fill="#FFD700" stroke="#1A0A00" stroke-width="0.4"/>
    </pattern>

    <!-- Suit symbol helper – ♥ red -->
    <text id="sh" font-family="serif" font-size="20" fill="#C41E3A" stroke="#1A0A00" stroke-width="0.5" paint-order="stroke fill" text-anchor="middle" dominant-baseline="middle">♥</text>
    <!-- ♠ black -->
    <text id="ss" font-family="serif" font-size="20" fill="#1A0A00" text-anchor="middle" dominant-baseline="middle">♠</text>
    <!-- ★ gold -->
    <text id="st" font-family="serif" font-size="18" fill="#FFD700" stroke="#1A0A00" stroke-width="0.5" paint-order="stroke fill" text-anchor="middle" dominant-baseline="middle">★</text>
    <!-- ♣ dark green -->
    <text id="sc" font-family="serif" font-size="20" fill="#1A4A00" text-anchor="middle" dominant-baseline="middle">♣</text>

    <!-- Small folk flower for accent -->
    <g id="sf">
      <ellipse cx="0" cy="-9"  rx="3" ry="5"  fill="#CC1A6A" stroke="#1A0A00" stroke-width="0.8" transform="rotate(0)"/>
      <ellipse cx="0" cy="-9"  rx="3" ry="5"  fill="#E87820" stroke="#1A0A00" stroke-width="0.8" transform="rotate(60)"/>
      <ellipse cx="0" cy="-9"  rx="3" ry="5"  fill="#CC1A6A" stroke="#1A0A00" stroke-width="0.8" transform="rotate(120)"/>
      <ellipse cx="0" cy="-9"  rx="3" ry="5"  fill="#E87820" stroke="#1A0A00" stroke-width="0.8" transform="rotate(180)"/>
      <ellipse cx="0" cy="-9"  rx="3" ry="5"  fill="#CC1A6A" stroke="#1A0A00" stroke-width="0.8" transform="rotate(240)"/>
      <ellipse cx="0" cy="-9"  rx="3" ry="5"  fill="#E87820" stroke="#1A0A00" stroke-width="0.8" transform="rotate(300)"/>
      <circle r="4.5" fill="#FFD700" stroke="#1A0A00" stroke-width="0.8"/>
      <circle r="2"   fill="#C41E3A"/>
    </g>

    <!-- Leaf -->
    <path id="lf" d="M 0,0 C -3,-4 -4,-13 0,-17 C 4,-13 3,-4 0,0 Z"
          fill="#2E7D32" stroke="#1A0A00" stroke-width="0.9"/>

  </defs>

  <!-- ════ BACKGROUND ════ -->
  <rect width="800" height="300" fill="#FFF5DC"/>

  <!-- ════ BORDER BANDS (red with gold stars) ════ -->
  <rect x="3"   y="3"   width="794" height="27" fill="url(#starband)"/>
  <rect x="3"   y="270" width="794" height="27" fill="url(#starband)"/>
  <rect x="3"   y="30"  width="27"  height="240" fill="url(#starband)"/>
  <rect x="770" y="30"  width="27"  height="240" fill="url(#starband)"/>

  <!-- ════ FRAME LINES ════ -->
  <rect x="3"   y="3"   width="794" height="294" rx="3" fill="none" stroke="#1A0A00" stroke-width="3.5"/>
  <rect x="33"  y="33"  width="734" height="234" fill="none" stroke="#1A0A00" stroke-width="1.5"/>
  <rect x="37"  y="37"  width="726" height="226" fill="none" stroke="#C41E3A" stroke-width="0.8"/>

  <!-- ════ CORNER STARS (large) ════ -->
  <polygon transform="translate(16,16)"
    points="0,-12 2.8,−3.7 11.4,-3.7 4.6,1.4 7.0,9.7 0,4.9 -7,9.7 -4.6,1.4 -11.4,-3.7 -2.8,-3.7"
    fill="#FFD700" stroke="#1A0A00" stroke-width="0.8"/>
  <polygon transform="translate(784,16)"
    points="0,-12 2.8,-3.7 11.4,-3.7 4.6,1.4 7.0,9.7 0,4.9 -7,9.7 -4.6,1.4 -11.4,-3.7 -2.8,-3.7"
    fill="#FFD700" stroke="#1A0A00" stroke-width="0.8"/>
  <polygon transform="translate(16,284)"
    points="0,-12 2.8,-3.7 11.4,-3.7 4.6,1.4 7.0,9.7 0,4.9 -7,9.7 -4.6,1.4 -11.4,-3.7 -2.8,-3.7"
    fill="#FFD700" stroke="#1A0A00" stroke-width="0.8"/>
  <polygon transform="translate(784,284)"
    points="0,-12 2.8,-3.7 11.4,-3.7 4.6,1.4 7.0,9.7 0,4.9 -7,9.7 -4.6,1.4 -11.4,-3.7 -2.8,-3.7"
    fill="#FFD700" stroke="#1A0A00" stroke-width="0.8"/>

  <!-- ════ SCATTERED SUIT ACCENTS (background decoration) ════ -->
  <text x="155" y="115" font-family="serif" font-size="28" fill="#C41E3A" opacity="0.55" transform="rotate(-12,155,115)">♥</text>
  <text x="615" y="112" font-family="serif" font-size="28" fill="#C41E3A" opacity="0.55" transform="rotate(10,615,112)">♥</text>
  <text x="100" y="175" font-family="serif" font-size="22" fill="#1A0A00" opacity="0.4"  transform="rotate(8,100,175)">♠</text>
  <text x="666" y="178" font-family="serif" font-size="22" fill="#1A0A00" opacity="0.4"  transform="rotate(-9,666,178)">♠</text>
  <text x="200" y="85"  font-family="serif" font-size="18" fill="#FFD700" opacity="0.7"  transform="rotate(-5,200,85)">★</text>
  <text x="570" y="83"  font-family="serif" font-size="18" fill="#FFD700" opacity="0.7"  transform="rotate(6,570,83)">★</text>
  <text x="130" y="230" font-family="serif" font-size="16" fill="#1A4A00" opacity="0.45" transform="rotate(14,130,230)">♣</text>
  <text x="645" y="228" font-family="serif" font-size="16" fill="#1A4A00" opacity="0.45" transform="rotate(-11,645,228)">♣</text>

  <!-- ════ FLANKING SMALL FLOWERS ════ -->
  <use href="#sf" transform="translate(310,155)"/>
  <use href="#lf" transform="translate(300,155) rotate(80)"/>
  <use href="#lf" transform="translate(322,145) rotate(95)"/>
  <use href="#sf" transform="translate(490,155)"/>
  <use href="#lf" transform="translate(480,145) rotate(275)"/>
  <use href="#lf" transform="translate(502,155) rotate(260)"/>

  <!-- ════ CARD FAN (5 cards, pivot at 400,190) ════ -->

  <!-- Card 5 – rightmost, purple/magenta, ♦ -->
  <g transform="translate(400,190) rotate(30)">
    <rect x="-18" y="-68" width="36" height="62" rx="3" fill="#F0E6FF" stroke="#1A0A00" stroke-width="1.8"/>
    <rect x="-15" y="-65" width="30" height="56" rx="2" fill="none" stroke="#7B2FBE" stroke-width="0.7"/>
    <text x="0" y="-35" font-family="serif" font-size="24" fill="#7B2FBE" text-anchor="middle" dominant-baseline="middle">♦</text>
    <text x="-11" y="-58" font-family="serif" font-size="10" fill="#7B2FBE">♦</text>
  </g>

  <!-- Card 4 – green, ♣ -->
  <g transform="translate(400,190) rotate(15)">
    <rect x="-18" y="-68" width="36" height="62" rx="3" fill="#E8F5E9" stroke="#1A0A00" stroke-width="1.8"/>
    <rect x="-15" y="-65" width="30" height="56" rx="2" fill="none" stroke="#2E7D32" stroke-width="0.7"/>
    <text x="0" y="-35" font-family="serif" font-size="24" fill="#2E7D32" text-anchor="middle" dominant-baseline="middle">♣</text>
    <text x="-11" y="-58" font-family="serif" font-size="10" fill="#2E7D32">♣</text>
  </g>

  <!-- Card 3 – center, gold, ★ (Lotería star) -->
  <g transform="translate(400,190) rotate(0)">
    <rect x="-18" y="-68" width="36" height="62" rx="3" fill="#FFFDE7" stroke="#1A0A00" stroke-width="1.8"/>
    <rect x="-15" y="-65" width="30" height="56" rx="2" fill="none" stroke="#F9A825" stroke-width="0.7"/>
    <text x="0" y="-35" font-family="serif" font-size="22" fill="#F9A825" text-anchor="middle" dominant-baseline="middle">★</text>
    <text x="-11" y="-58" font-family="serif" font-size="10" fill="#F9A825">★</text>
  </g>

  <!-- Card 2 – blue, ♠ -->
  <g transform="translate(400,190) rotate(-15)">
    <rect x="-18" y="-68" width="36" height="62" rx="3" fill="#E8EAF6" stroke="#1A0A00" stroke-width="1.8"/>
    <rect x="-15" y="-65" width="30" height="56" rx="2" fill="none" stroke="#1A237E" stroke-width="0.7"/>
    <text x="0" y="-35" font-family="serif" font-size="24" fill="#1A237E" text-anchor="middle" dominant-baseline="middle">♠</text>
    <text x="-11" y="-58" font-family="serif" font-size="10" fill="#1A237E">♠</text>
  </g>

  <!-- Card 1 – leftmost, red, ♥ -->
  <g transform="translate(400,190) rotate(-30)">
    <rect x="-18" y="-68" width="36" height="62" rx="3" fill="#FFF5F5" stroke="#1A0A00" stroke-width="1.8"/>
    <rect x="-15" y="-65" width="30" height="56" rx="2" fill="none" stroke="#C41E3A" stroke-width="0.7"/>
    <text x="0" y="-35" font-family="serif" font-size="24" fill="#C41E3A" text-anchor="middle" dominant-baseline="middle">♥</text>
    <text x="-11" y="-58" font-family="serif" font-size="10" fill="#C41E3A">♥</text>
  </g>

  <!-- ════ LOTERÍA RIBBON BANNER ════ -->
  <!-- Left fold (dark red triangle) -->
  <polygon points="118,232 93,251 118,270" fill="#8B0000" stroke="#1A0A00" stroke-width="1.5"/>
  <!-- Right fold -->
  <polygon points="682,232 707,251 682,270" fill="#8B0000" stroke="#1A0A00" stroke-width="1.5"/>
  <!-- Banner body -->
  <rect x="118" y="232" width="564" height="38" rx="4" fill="#C41E3A" stroke="#1A0A00" stroke-width="2"/>
  <!-- Small gold lines inside banner -->
  <line x1="122" y1="237" x2="678" y2="237" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
  <line x1="122" y1="266" x2="678" y2="266" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
  <!-- Banner text -->
  <text x="400" y="256"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="26"
        font-weight="900"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="14"
        fill="#FFD700"
        stroke="#1A0A00"
        stroke-width="1.2"
        paint-order="stroke fill">CARTAS</text>

  <!-- ════ SMALL STAR ACCENTS AROUND FAN ════ -->
  <polygon transform="translate(338,145)"
    points="0,-8 1.9,-2.5 7.6,-2.5 3.1,1 4.7,6.5 0,3.3 -4.7,6.5 -3.1,1 -7.6,-2.5 -1.9,-2.5"
    fill="#FFD700" stroke="#1A0A00" stroke-width="0.5"/>
  <polygon transform="translate(462,143)"
    points="0,-8 1.9,-2.5 7.6,-2.5 3.1,1 4.7,6.5 0,3.3 -4.7,6.5 -3.1,1 -7.6,-2.5 -1.9,-2.5"
    fill="#FFD700" stroke="#1A0A00" stroke-width="0.5"/>
  <polygon transform="translate(400,65)"
    points="0,-9 2.2,-2.8 8.6,-2.8 3.5,1.1 5.3,7.3 0,3.7 -5.3,7.3 -3.5,1.1 -8.6,-2.8 -2.2,-2.8"
    fill="#FFD700" stroke="#1A0A00" stroke-width="0.5"/>

</svg>
